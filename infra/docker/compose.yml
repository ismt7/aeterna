name: aeterna

services:
  app:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: development
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    volumes:
      - ../..:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next

  app-prod:
    profiles:
      - prod
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile
      target: runner
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
    ports:
      - "3000:3000"
    volumes:
      - ../../src/data:/app/src/data:ro

volumes:
  node_modules:
  next_cache:
