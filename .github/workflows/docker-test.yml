name: Docker Image Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: docker-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: infra/docker/Dockerfile
          target: runner
          load: true
          tags: aeterna:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start container
        run: docker run -d --name aeterna-test -p 3000:3000 aeterna:test

      - name: Wait for app to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/; then
              echo "Container is ready"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Container failed to start within 60 seconds"
          docker logs aeterna-test
          exit 1

      - name: Smoke test - GET /
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:3000/)
          echo "HTTP status: $status"
          [ "$status" = "200" ] || { echo "Expected 200, got $status"; exit 1; }

      - name: Show container logs on failure
        if: failure()
        run: docker logs aeterna-test

      - name: Stop and remove container
        if: always()
        run: docker stop aeterna-test && docker rm aeterna-test
